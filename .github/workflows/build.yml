name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Securely provisions a full, working global Gradle engine in the cloud
    - name: Validate and Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.6

    # Dropped "./gradlew" and replaced it with global "gradle"
    # This bypasses all missing file errors completely!
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
